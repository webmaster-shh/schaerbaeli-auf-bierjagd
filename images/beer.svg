        <rect x="16" y="30" width="30" height="11" rx="2.6" fill="url(#labelBlue)" stroke="#f7f4da" stroke-width="1.6"></rect>
        <rect x="15" y="48" width="32" height="28" rx="2.8" fill="url(#labelScene)" stroke="#1c53b7" stroke-width="2"></rect>
        <path d="M18 67 L24 57 L30 64 L36 54 L44 67 Z" fill="#8cc96e" opacity=".96"></path>
        <path d="M18 59 L24 51 L30 58 L36 48 L44 59 Z" fill="#edf7ff"></path>
