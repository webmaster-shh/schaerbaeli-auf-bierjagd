        <ellipse cx="36" cy="47" rx="2.8" ry="3.3" fill="#e4ff8a" opacity=".5"></ellipse>
        <ellipse cx="24" cy="61" rx="2.3" ry="2.9" fill="#e4ff8a" opacity=".4"></ellipse>
        <ellipse cx="39" cy="81" rx="3" ry="3.5" fill="#d8ff89" opacity=".35"></ellipse>
      </g>
    </g>

    <!-- Right bottle -->
    <g transform="translate(76 14) rotate(8 18 34)">
      <g>
        <rect x="21" y="1" width="12" height="8" rx="2.5" fill="url(#goldCap)" stroke="#8e6512" stroke-width="1.5"></rect>
        <path d="M20 4.5h14" stroke="#fff1b8" stroke-width="1" opacity=".65"></path>
        <path d="M18 9
                 C18 9 20 22 15 33
                 C11 42 10 48 10 61
                 V78
                 C10 84 14 88 20 88
                 H34
                 C40 88 44 84 44 78
                 V61
                 C44 48 43 42 39 33
                 C34 22 36 9 36 9Z" fill="url(#glassGreenDark)" stroke="#195f22" stroke-width="2.2"></path>

        <rect x="14" y="27" width="26" height="10" rx="2.5" fill="url(#labelBlue)" stroke="#f7f4da" stroke-width="1.5"></rect>
        <rect x="14" y="44" width="26" height="24" rx="2.5" fill="url(#labelScene)" stroke="#1c53b7" stroke-width="1.8"></rect>
        <path d="M16 60 L22 51 L27 57 L32 48 L38 60 Z" fill="#8cc96e" opacity=".95"></path>
        <path d="M16 53 L22 47 L27 52 L32 44 L38 53 Z" fill="#edf7ff"></path>
        <rect x="16.5" y="63" width="21" height="3.5" rx="1.7" fill="#2f6bd7"></rect>

        <path d="M23 13 C21 25 18 29 16 34" stroke="#dcffb7" stroke-width="2.2" stroke-linecap="round" opacity=".45"></path>
        <ellipse cx="29" cy="20" rx="2.2" ry="3.1" fill="#d9ff8d" opacity=".55"></ellipse>
        <ellipse cx="31" cy="42" rx="2.3" ry="2.8" fill="#d9ff8d" opacity=".45"></ellipse>
        <ellipse cx="21" cy="55" rx="2" ry="2.5" fill="#d9ff8d" opacity=".35"></ellipse>
      </g>
