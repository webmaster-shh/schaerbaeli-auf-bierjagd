<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 95" fill="none">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#2e6f36" flood-opacity="0.18"></feDropShadow>
    </filter>

    <linearGradient id="glassGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#97ef58"></stop>
      <stop offset="0.45" stop-color="#67cb3f"></stop>
      <stop offset="1" stop-color="#2e9b2f"></stop>
    </linearGradient>

    <linearGradient id="glassGreenDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#79d84d"></stop>
      <stop offset="1" stop-color="#22852a"></stop>
    </linearGradient>

    <linearGradient id="labelBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f84ff"></stop>
      <stop offset="1" stop-color="#1f57c8"></stop>
    </linearGradient>

    <linearGradient id="goldCap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe27d"></stop>
      <stop offset="1" stop-color="#d59a1d"></stop>
    </linearGradient>

    <linearGradient id="labelScene" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dff8ff"></stop>
      <stop offset="0.55" stop-color="#97e4ff"></stop>
      <stop offset="1" stop-color="#7cd67d"></stop>
    </linearGradient>
  </defs>

  <g filter="url(#shadow)">
    <!-- Left bottle -->
    <g transform="translate(10 14) rotate(-8 18 34)">
      <g>
        <rect x="21" y="1" width="12" height="8" rx="2.5" fill="url(#goldCap)" stroke="#8e6512" stroke-width="1.5"></rect>
        <path d="M20 4.5h14" stroke="#fff1b8" stroke-width="1" opacity=".65"></path>
        <path d="M18 9
                 C18 9 20 22 15 33
                 C11 42 10 48 10 61
                 V78
                 C10 84 14 88 20 88
                 H34
                 C40 88 44 84 44 78
                 V61
                 C44 48 43 42 39 33
                 C34 22 36 9 36 9Z" fill="url(#glassGreenDark)" stroke="#195f22" stroke-width="2.2"></path>

        <rect x="14" y="27" width="26" height="10" rx="2.5" fill="url(#labelBlue)" stroke="#f7f4da" stroke-width="1.5"></rect>
        <rect x="14" y="44" width="26" height="24" rx="2.5" fill="url(#labelScene)" stroke="#1c53b7" stroke-width="1.8"></rect>
        <path d="M16 60 L22 51 L27 57 L32 48 L38 60 Z" fill="#8cc96e" opacity=".95"></path>
        <path d="M16 53 L22 47 L27 52 L32 44 L38 53 Z" fill="#edf7ff"></path>
        <rect x="16.5" y="63" width="21" height="3.5" rx="1.7" fill="#2f6bd7"></rect>

        <path d="M23 13 C21 25 18 29 16 34" stroke="#dcffb7" stroke-width="2.2" stroke-linecap="round" opacity=".45"></path>
        <ellipse cx="29" cy="20" rx="2.2" ry="3.1" fill="#d9ff8d" opacity=".55"></ellipse>
        <ellipse cx="31" cy="42" rx="2.3" ry="2.8" fill="#d9ff8d" opacity=".45"></ellipse>
        <ellipse cx="21" cy="55" rx="2" ry="2.5" fill="#d9ff8d" opacity=".35"></ellipse>
      </g>
    </g>

    <!-- Middle bottle -->
    <g transform="translate(38 2)">
      <g>
        <rect x="24" y="1" width="14" height="9" rx="2.5" fill="url(#goldCap)" stroke="#8e6512" stroke-width="1.5"></rect>
        <path d="M23 5h16" stroke="#fff1b8" stroke-width="1" opacity=".65"></path>
        <path d="M21 10
